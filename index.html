<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reporte CXC - Vibras Positivas HM</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background: #f0f2f5; color: #333; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h2 { color: #1a5276; text-align: center; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #7f8c8d; margin-bottom: 25px; }
        .upload-area { border: 2px dashed #3498db; padding: 40px; text-align: center; cursor: pointer; background: #fbfffe; border-radius: 10px; transition: 0.3s; }
        .upload-area:hover { background: #e8f4fd; border-color: #2980b9; }
        table { width: 100%; border-collapse: collapse; margin-top: 25px; background: white; font-size: 0.9em; }
        th, td { border: 1px solid #e0e0e0; padding: 12px; text-align: right; }
        th { background-color: #2ecc71; color: white; text-align: center; font-weight: 600; }
        .detalles th { background-color: #34495e; }
        .total-global { background: #f1c40f; font-weight: bold; }
        .credits { margin-top: 40px; padding-top: 20px; border-top: 1px solid #eee; font-size: 0.85em; color: #95a5a6; text-align: center; }
        .section-title { margin-top: 40px; color: #2c3e50; border-left: 5px solid #2ecc71; padding-left: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Reporte de Cartera por Edades (CXC)</h2>
    <p class="subtitle">Clasificación automática de cartera y conteo de clientes únicos</p>
    
    <div class="upload-area" id="drop-area">
        <strong>Arrastra aquí tu archivo Excel/CSV</strong> o haz clic para seleccionar<br>
        <small>(Asegúrate que tenga las columnas: razon_social, fecha y ttotal)</small>
        <input type="file" id="fileInput" hidden accept=".xlsx, .xls, .csv">
    </div>

    <div id="resumen-container"></div>
    <div id="detalle-container"></div>

    <div class="credits">
        <strong>VIBRAS POSITIVAS HM</strong><br>
        © Todos los derechos reservados - 2026
    </div>
</div>

<script>
const fileInput = document.getElementById('fileInput');
const dropArea = document.getElementById('drop-area');

dropArea.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = (evt) => {
        const bstr = evt.target.result;
        const workbook = XLSX.read(bstr, { type: 'binary' });
        const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
        procesarCartera(rows);
    };
    reader.readAsBinaryString(file);
});

function procesarCartera(data) {
    const hoy = new Date(); // Fecha actual: Abril 2026
    const rangos = {
        '0-30': { total: 0, clientes: new Map() },
        '31-60': { total: 0, clientes: new Map() },
        '61-90': { total: 0, clientes: new Map() },
        '91-120': { total: 0, clientes: new Map() },
        '121-180': { total: 0, clientes: new Map() },
        'mas_180': { total: 0, clientes: new Map() }
    };

    data.forEach(row => {
        const fechaDoc = new Date(row.fecha);
        const monto = parseFloat(row.ttotal) || 0;
        const nombre = row.razon_social || 'SIN NOMBRE';

        if (isNaN(fechaDoc.getTime())) return;

        const diffDays = Math.ceil(Math.abs(hoy - fechaDoc) / (1000 * 60 * 60 * 24));
        let key = diffDays <= 30 ? '0-30' : 
                  diffDays <= 60 ? '31-60' : 
                  diffDays <= 90 ? '61-90' : 
                  diffDays <= 120 ? '91-120' : 
                  diffDays <= 180 ? '121-180' : 'mas_180';

        rangos[key].total += monto;
        // Acumular por cliente individual dentro del rango
        const actual = rangos[key].clientes.get(nombre) || 0;
        rangos[key].clientes.set(nombre, actual + monto);
    });

    renderizarTodo(rangos);
}

function renderizarTodo(rangos) {
    // 1. Render Resumen
    let htmlResumen = `<h3 class="section-title">Consolidado General</h3><table>
        <tr><th>Rango de Días</th><th>Monto Total Cartera</th><th>Clientes Únicos</th></tr>`;
    
    let granTotal = 0;
    for (const [rango, info] of Object.entries(rangos)) {
        granTotal += info.total;
        htmlResumen += `<tr>
            <td style="text-align:center">${rango} días</td>
            <td>$ ${info.total.toLocaleString('es-CO')}</td>
            <td style="text-align:center">${info.clientes.size}</td>
        </tr>`;
    }
    htmlResumen += `<tr class="total-global"><td>TOTAL GENERAL</td><td>$ ${granTotal.toLocaleString('es-CO')}</td><td>-</td></tr></table>`;
    document.getElementById('resumen-container').innerHTML = htmlResumen;

    // 2. Render Detalle por Cliente
    let htmlDetalle = `<h3 class="section-title">Detalle por Cliente y Rango</h3><table class="detalles">
        <tr><th>Cliente</th><th>Rango</th><th>Saldo Pendiente</th></tr>`;
    
    for (const [rango, info] of Object.entries(rangos)) {
        // Ordenar clientes por monto de mayor a menor
        const clientesSorted = new Map([...info.clientes.entries()].sort((a, b) => b[1] - a[1]));
        clientesSorted.forEach((monto, nombre) => {
            htmlDetalle += `<tr>
                <td style="text-align:left">${nombre}</td>
                <td style="text-align:center">${rango}</td>
                <td>$ ${monto.toLocaleString('es-CO')}</td>
            </tr>`;
        });
    }
    htmlDetalle += `</table>`;
    document.getElementById('detalle-container').innerHTML = htmlDetalle;
}
</script>
</body>
</html>
