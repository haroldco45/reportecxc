<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reporte CXC - Vibras Positivas HM</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f0f2f5; color: #333; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h2 { color: #1a5276; text-align: center; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #7f8c8d; margin-bottom: 25px; }
        .upload-area { border: 2px dashed #3498db; padding: 40px; text-align: center; cursor: pointer; background: #fbfffe; border-radius: 10px; transition: 0.3s; }
        .upload-area:hover { background: #e8f4fd; }
        table { width: 100%; border-collapse: collapse; margin-top: 25px; font-size: 0.9em; }
        th, td { border: 1px solid #e0e0e0; padding: 12px; text-align: right; }
        th { background-color: #2ecc71; color: white; text-align: center; font-weight: 600; }
        .total-global { background: #f1c40f; font-weight: bold; }
        .section-title { margin-top: 40px; color: #2c3e50; border-left: 5px solid #2ecc71; padding-left: 10px; }
        .credits { margin-top: 40px; border-top: 1px solid #eee; padding-top: 20px; font-size: 0.85em; color: #95a5a6; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2>Reporte de Cartera por Edades (CXC)</h2>
    <p class="subtitle">Análisis al 01/01/2026 - Vibras Positivas HM</p>
    
    <div class="upload-area" id="drop-area">
        <strong>Sube el archivo de Excel aquí</strong><br>
        <small>Encabezados en Fila 1: razon_social, fecha, ttotal</small>
        <input type="file" id="fileInput" hidden accept=".xlsx, .xls, .csv">
    </div>

    <div id="resumen-container"></div>
    <div id="detalle-container"></div>

    <div class="credits">
        <strong>VIBRAS POSITIVAS HM</strong><br>
        © Todos los derechos reservados - 2026
    </div>
</div>

<script>
const fileInput = document.getElementById('fileInput');
const dropArea = document.getElementById('drop-area');
const FECHA_CORTE = new Date(2026, 0, 1); // 1 de Enero de 2026

dropArea.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = (evt) => {
        const bstr = evt.target.result;
        const workbook = XLSX.read(bstr, { type: 'binary', cellDates: true });
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const matrix = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
        procesarMatriz(matrix);
    };
    reader.readAsBinaryString(file);
});

function procesarMatriz(matrix) {
    const rangos = {
        '0-30': { total: 0, clientes: new Map() },
        '31-60': { total: 0, clientes: new Map() },
        '61-90': { total: 0, clientes: new Map() },
        '91-120': { total: 0, clientes: new Map() },
        '121-180': { total: 0, clientes: new Map() },
        'mas_180': { total: 0, clientes: new Map() }
    };

    const encabezados = matrix[0].map(c => String(c).toLowerCase().trim());
    const colNombre = encabezados.indexOf('razon_social');
    const colFecha = encabezados.indexOf('fecha');
    const colTotal = encabezados.indexOf('ttotal');

    if (colNombre === -1 || colFecha === -1 || colTotal === -1) {
        alert("Error: No encontré las columnas exactas 'razon_social', 'fecha' y 'ttotal' en la fila 1.");
        return;
    }

    for (let i = 1; i < matrix.length; i++) {
        const fila = matrix[i];
        if (!fila[colNombre] || fila[colNombre] === "") continue;

        const nombre = String(fila[colNombre]).trim();
        
        // --- LIMPIEZA DE MONEDA ---
        let valorRaw = fila[colTotal];
        let monto = 0;
        if (typeof valorRaw === 'string') {
            // Elimina todo menos números, comas y puntos
            monto = Number(valorRaw.replace(/[^0-9.-]+/g, "")) || 0;
        } else {
            monto = Number(valorRaw) || 0;
        }

        // --- PROCESAR FECHA ---
        let fechaRaw = fila[colFecha];
        let fechaDoc;
        
        if (fechaRaw instanceof Date) {
            fechaDoc = fechaRaw;
        } else if (!isNaN(fechaRaw) && fechaRaw !== "") {
            // Por si Excel manda la fecha como número (serie)
            fechaDoc = new Date((fechaRaw - 25569) * 86400 * 1000);
        } else {
            fechaDoc = new Date(fechaRaw);
        }

        if (isNaN(fechaDoc.getTime()) || monto === 0) continue;

        // --- CÁLCULO DE DÍAS VS 01/01/2026 ---
        const diffTime = FECHA_CORTE.getTime() - fechaDoc.getTime();
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

        let key = "";
        if (diffDays <= 30) key = '0-30';
        else if (diffDays <= 60) key = '31-60';
        else if (diffDays <= 90) key = '61-90';
        else if (diffDays <= 120) key = '91-120';
        else if (diffDays <= 180) key = '121-180';
        else key = 'mas_180';

        rangos[key].total += monto;
        const subtotal = rangos[key].clientes.get(nombre) || 0;
        rangos[key].clientes.set(nombre, subtotal + monto);
    }

    renderizarTablas(rangos);
}

function renderizarTablas(rangos) {
    let granTotal = 0;
    let htmlRes = `<h3 class="section-title">Resumen de Cartera</h3><table>
        <tr><th>Rango</th><th>Total Dinero</th><th>Clientes Únicos</th></tr>`;
    
    for (const [rango, info] of Object.entries(rangos)) {
        granTotal += info.total;
        htmlRes += `<tr><td style="text-align:center">${rango} días</td>
            <td>$ ${info.total.toLocaleString('es-CO', {minimumFractionDigits: 0, maximumFractionDigits: 0})}</td>
            <td style="text-align:center">${info.clientes.size}</td></tr>`;
    }
    htmlRes += `<tr class="total-global"><td>TOTAL CARTERA</td><td>$ ${granTotal.toLocaleString('es-CO', {minimumFractionDigits: 0})}</td><td>-</td></tr></table>`;
    
    let htmlDet = `<h3 class="section-title">Detalle de Saldos</h3><table>
        <tr><th>Cliente</th><th>Rango</th><th>Monto</th></tr>`;
    
    // Unificar detalle por cliente para mostrarlo ordenado
    Object.entries(rangos).forEach(([rango, info]) => {
        const sorted = new Map([...info.clientes.entries()].sort((a, b) => b[1] - a[1]));
        sorted.forEach((monto, nombre) => {
            htmlDet += `<tr><td style="text-align:left">${nombre}</td>
                <td style="text-align:center">${rango} días</td>
                <td>$ ${monto.toLocaleString('es-CO', {minimumFractionDigits: 0})}</td></tr>`;
        });
    });

    document.getElementById('resumen-container').innerHTML = htmlRes;
    document.getElementById('detalle-container').innerHTML = htmlDet + `</table>`;
}
</script>
</body>
</html>
