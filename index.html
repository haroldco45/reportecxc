<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reporte CXC - Vibras Positivas HM</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f0f2f5; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h2 { color: #1a5276; text-align: center; }
        .upload-area { border: 2px dashed #3498db; padding: 40px; text-align: center; cursor: pointer; background: #fbfffe; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 25px; }
        th, td { border: 1px solid #e0e0e0; padding: 12px; text-align: right; }
        th { background-color: #2ecc71; color: white; text-align: center; }
        .total-global { background: #f1c40f; font-weight: bold; }
        .section-title { margin-top: 40px; color: #2c3e50; border-left: 5px solid #2ecc71; padding-left: 10px; }
        .credits { margin-top: 40px; text-align: center; color: #95a5a6; font-size: 0.8em; }
    </style>
</head>
<body>

<div class="container">
    <h2>Reporte de Cartera por Edades (CXC)</h2>
    <div class="upload-area" id="drop-area">
        <strong>Arrastra aquí el archivo</strong> o haz clic para seleccionar<br>
        <small>Buscando: razon_social, fecha, ttotal</small>
        <input type="file" id="fileInput" hidden accept=".xlsx, .xls, .csv">
    </div>
    <div id="resumen-container"></div>
    <div id="detalle-container"></div>
    <div class="credits"><strong>VIBRAS POSITIVAS HM</strong><br>© 2026</div>
</div>

<script>
const fileInput = document.getElementById('fileInput');
const dropArea = document.getElementById('drop-area');

dropArea.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = (evt) => {
        const bstr = evt.target.result;
        const workbook = XLSX.read(bstr, { type: 'binary', cellDates: true });
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        
        // FORZAMOS LA LECTURA DESDE LA FILA QUE TENGA DATOS
        const rows = XLSX.utils.sheet_to_json(sheet, { 
            header: 1, // Leemos como matriz para encontrar los títulos manualmente
            defval: "" 
        });
        
        procesarMatriz(rows);
    };
    reader.readAsBinaryString(file);
});

function procesarMatriz(matrix) {
    const hoy = new Date("2026-04-23");
    const rangos = {
        '0-30': { total: 0, clientes: new Map() },
        '31-60': { total: 0, clientes: new Map() },
        '61-90': { total: 0, clientes: new Map() },
        '91-120': { total: 0, clientes: new Map() },
        '121-180': { total: 0, clientes: new Map() },
        'mas_180': { total: 0, clientes: new Map() }
    };

    // 1. ENCONTRAR EN QUÉ FILA ESTÁN LOS TÍTULOS
    let indexTitulos = -1;
    let colNombre = -1, colFecha = -1, colTotal = -1;

    for(let i = 0; i < matrix.length; i++) {
        const fila = matrix[i].map(c => String(c).toLowerCase().trim());
        colNombre = fila.indexOf('razon_social');
        colFecha = fila.indexOf('fecha');
        colTotal = fila.indexOf('ttotal');

        if(colNombre !== -1 && colFecha !== -1) {
            indexTitulos = i;
            break;
        }
    }

    if(indexTitulos === -1) {
        alert("No encontré las columnas 'razon_social', 'fecha' y 'ttotal'. Revisa los encabezados.");
        return;
    }

    // 2. PROCESAR DESDE LA FILA SIGUIENTE A LOS TÍTULOS
    for(let i = indexTitulos + 1; i < matrix.length; i++) {
        const fila = matrix[i];
        const nombre = String(fila[colNombre] || "DESCONOCIDO").trim();
        let fechaRaw = fila[colFecha];
        let totalRaw = fila[colTotal];

        if(!nombre || !fechaRaw) continue;

        // Limpiar Monto
        let monto = 0;
        if(typeof totalRaw === 'string') {
            monto = parseFloat(totalRaw.replace(/[$\s.]/g, '').replace(',', '.')) || 0;
        } else {
            monto = parseFloat(totalRaw) || 0;
        }

        // Limpiar Fecha
        let fechaDoc = (fechaRaw instanceof Date) ? fechaRaw : new Date(fechaRaw);
        if(isNaN(fechaDoc.getTime()) || monto === 0) continue;

        const diffDays = Math.ceil(Math.abs(hoy - fechaDoc) / (1000 * 60 * 60 * 24));
        let key = diffDays <= 30 ? '0-30' : 
                  diffDays <= 60 ? '31-60' : 
                  diffDays <= 90 ? '61-90' : 
                  diffDays <= 120 ? '91-120' : 
                  diffDays <= 180 ? '121-180' : 'mas_180';

        rangos[key].total += monto;
        rangos[key].clientes.set(nombre, (rangos[key].clientes.get(nombre) || 0) + monto);
    }

    renderizar(rangos);
}

function renderizar(rangos) {
    let granTotal = 0;
    let htmlRes = `<h3 class="section-title">Consolidado</h3><table><tr><th>Rango</th><th>Monto</th><th>Clientes</th></tr>`;
    for (const [rango, info] of Object.entries(rangos)) {
        granTotal += info.total;
        htmlRes += `<tr><td>${rango} días</td><td>$ ${info.total.toLocaleString('es-CO')}</td><td style="text-align:center">${info.clientes.size}</td></tr>`;
    }
    htmlRes += `<tr class="total-global"><td>TOTAL</td><td>$ ${granTotal.toLocaleString('es-CO')}</td><td>-</td></tr></table>`;
    
    let htmlDet = `<h3 class="section-title">Detalle</h3><table><tr><th>Cliente</th><th>Rango</th><th>Saldo</th></tr>`;
    Object.entries(rangos).forEach(([rango, info]) => {
        info.clientes.forEach((monto, nombre) => {
            htmlDet += `<tr><td>${nombre}</td><td style="text-align:center">${rango}</td><td>$ ${monto.toLocaleString('es-CO')}</td></tr>`;
        });
    });
    
    document.getElementById('resumen-container').innerHTML = htmlRes;
    document.getElementById('detalle-container').innerHTML = htmlDet + `</table>`;
}
</script>
</body>
</html>
