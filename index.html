<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reporte CXC - Vibras Positivas HM</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f0f2f5; color: #333; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h2 { color: #1a5276; text-align: center; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #7f8c8d; margin-bottom: 25px; }
        .upload-area { border: 2px dashed #3498db; padding: 40px; text-align: center; cursor: pointer; background: #fbfffe; border-radius: 10px; }
        .upload-area:hover { background: #e8f4fd; }
        table { width: 100%; border-collapse: collapse; margin-top: 25px; font-size: 0.9em; }
        th, td { border: 1px solid #e0e0e0; padding: 12px; text-align: right; }
        th { background-color: #2ecc71; color: white; text-align: center; }
        .total-global { background: #f1c40f; font-weight: bold; }
        .section-title { margin-top: 40px; color: #2c3e50; border-left: 5px solid #2ecc71; padding-left: 10px; }
        .credits { margin-top: 40px; border-top: 1px solid #eee; padding-top: 20px; font-size: 0.85em; color: #95a5a6; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2>Reporte de Cartera por Edades (CXC)</h2>
    <p class="subtitle">Análisis Inteligente - Vibras Positivas HM</p>
    
    <div class="upload-area" id="drop-area">
        <strong>Arrastra aquí tu archivo Excel</strong> o haz clic para seleccionar<br>
        <small>El sistema detectará automáticamente los encabezados en cualquier fila.</small>
        <input type="file" id="fileInput" hidden accept=".xlsx, .xls, .csv">
    </div>

    <div id="resumen-container"></div>
    <div id="detalle-container"></div>

    <div class="credits">
        <strong>VIBRAS POSITIVAS HM</strong><br>
        © Todos los derechos reservados - 2026
    </div>
</div>

<script>
const fileInput = document.getElementById('fileInput');
const dropArea = document.getElementById('drop-area');

dropArea.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = (evt) => {
        const bstr = evt.target.result;
        const workbook = XLSX.read(bstr, { type: 'binary', cellDates: true });
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        
        // Convertimos a matriz (arreglo de arreglos) para buscar los títulos manualmente
        const matrix = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
        procesarMatriz(matrix);
    };
    reader.readAsBinaryString(file);
});

function procesarMatriz(matrix) {
    const hoy = new Date("2026-04-23");
    const rangos = {
        '0-30': { total: 0, clientes: new Map() },
        '31-60': { total: 0, clientes: new Map() },
        '61-90': { total: 0, clientes: new Map() },
        '91-120': { total: 0, clientes: new Map() },
        '121-180': { total: 0, clientes: new Map() },
        'mas_180': { total: 0, clientes: new Map() }
    };

    let filaTitulos = -1;
    let colNombre = -1, colFecha = -1, colTotal = -1;

    // BUSCADOR DE ENCABEZADOS: Recorre las primeras 20 filas buscando los títulos
    for (let i = 0; i < Math.min(matrix.length, 20); i++) {
        const fila = matrix[i].map(c => String(c).toLowerCase().trim());
        if (fila.includes('razon_social') || fila.includes('cliente')) {
            filaTitulos = i;
            colNombre = fila.indexOf('razon_social') !== -1 ? fila.indexOf('razon_social') : fila.indexOf('cliente');
            colFecha = fila.indexOf('fecha');
            colTotal = fila.indexOf('ttotal');
            break;
        }
    }

    if (filaTitulos === -1) {
        alert("No se encontraron las columnas necesarias (razon_social, fecha, ttotal). Revisa el archivo.");
        return;
    }

    // PROCESAMIENTO: Empezamos una fila después de los títulos
    for (let i = filaTitulos + 1; i < matrix.length; i++) {
        const fila = matrix[i];
        const nombre = String(fila[colNombre] || "").trim();
        const fechaRaw = fila[colFecha];
        const totalRaw = fila[colTotal];

        if (!nombre || nombre === "" || !fechaRaw) continue;

        // Limpiar el monto (por si viene como texto con puntos o $)
        let monto = 0;
        if (typeof totalRaw === 'string') {
            monto = parseFloat(totalRaw.replace(/[$.]/g, '').replace(',', '.')) || 0;
        } else {
            monto = parseFloat(totalRaw) || 0;
        }

        // Procesar la fecha
        let fechaDoc = (fechaRaw instanceof Date) ? fechaRaw : new Date(fechaRaw);
        if (isNaN(fechaDoc.getTime()) || monto === 0) continue;

        const diffDays = Math.ceil(Math.abs(hoy - fechaDoc) / (1000 * 60 * 60 * 24));
        let key = diffDays <= 30 ? '0-30' : 
                  diffDays <= 60 ? '31-60' : 
                  diffDays <= 90 ? '61-90' : 
                  diffDays <= 120 ? '91-120' : 
                  diffDays <= 180 ? '121-180' : 'mas_180';

        rangos[key].total += monto;
        rangos[key].clientes.set(nombre, (rangos[key].clientes.get(nombre) || 0) + monto);
    }

    renderizar(rangos);
}

function renderizar(rangos) {
    let granTotal = 0;
    let htmlRes = `<h3 class="section-title">Consolidado General</h3><table>
        <tr><th>Rango de Días</th><th>Monto Total</th><th>Cant. Clientes</th></tr>`;
    
    for (const [rango, info] of Object.entries(rangos)) {
        granTotal += info.total;
        htmlRes += `<tr><td style="text-align:center">${rango} días</td>
            <td>$ ${info.total.toLocaleString('es-CO')}</td>
            <td style="text-align:center">${info.clientes.size}</td></tr>`;
    }
    htmlRes += `<tr class="total-global"><td>TOTAL GENERAL</td><td>$ ${granTotal.toLocaleString('es-CO')}</td><td>-</td></tr></table>`;
    
    let htmlDet = `<h3 class="section-title">Detalle por Cliente</h3><table>
        <tr><th>Cliente</th><th>Rango</th><th>Saldo</th></tr>`;
    
    Object.entries(rangos).forEach(([rango, info]) => {
        const sorted = new Map([...info.clientes.entries()].sort((a, b) => b[1] - a[1]));
        sorted.forEach((monto, nombre) => {
            htmlDet += `<tr><td style="text-align:left">${nombre}</td>
                <td style="text-align:center">${rango} días</td>
                <td>$ ${monto.toLocaleString('es-CO')}</td></tr>`;
        });
    });

    document.getElementById('resumen-container').innerHTML = htmlRes;
    document.getElementById('detalle-container').innerHTML = htmlDet + `</table>`;
}
</script>
</body>
</html>
